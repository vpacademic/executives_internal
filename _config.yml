title: GSS Executives and Staff Guide
description: >-
  A practical reference for executives and staff of the Graduate Student
  Society of UBC Vancouver.
theme: just-the-docs
url: "https://salmon-ocean-0ac3fb40f.7.azurestaticapps.net/"
baseurl: ""
logo: "/images/gss-logo-teal.svg"

aux_links:
  "GSS Website":
    - "https://gss.ubc.ca"

search_enabled: true
search:
  heading_level: 2
  previews: 3

heading_anchors: true

mermaid:
  version: "10"

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

nav_sort: case_insensitive

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - README.md
  - node_modules/
  - vendor/
